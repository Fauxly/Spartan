name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # Для сборки под Apple TV нужен macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Spartan
        run: |
          # Команда сборки проекта (зависит от структуры Spartan)
          xcodebuild -project Spartan.xcodeproj -scheme Spartan -configuration Release -sdk appletvos CONFIGURATION_BUILD_DIR=./build

      - name: Prepare Deb Package
        run: |
          mkdir -p layout/var/jb/Applications
          cp -r build/Spartan.app layout/var/jb/Applications/
          
          # Создаем папку DEBIAN и файл control
          mkdir -p layout/DEBIAN
          cat <<EOF > layout/DEBIAN/control
          Package: com.fauxly.spartan
          Name: Spartan
          Version: 1.0.0
          Architecture: iphoneos-arm64
          Maintainer: Fauxly
          Description: File Manager for Apple TV (Rootless)
          Author: Fauxly
          Section: Applications
          Depends: firmware (>= 15.0)
          EOF

      - name: Build .deb
        run: |
          # Используем dpkg для упаковки
          brew install dpkg
          dpkg-deb -Zxz --root-owner-group -b layout spartan_rootless.deb

      - name: Update Repo Indexes
        run: |
          mkdir -p debs
          mv spartan_rootless.deb debs/
          dpkg-scanpackages -m debs > Packages
          bzip2 -c Packages > Packages.bz2

      - name: Deploy to Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Загружаем файлы индекса и debs в GitHub Pages
          branch: gh-pages

name: Build Spartan DEB

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Packages
        run: |
          xcodebuild -resolvePackageDependencies

      - name: Disable Code Signing
        run: |
          find . -name project.pbxproj | while read file; do
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$file"
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$file"
            sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' "$file"
            sed -i '' 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/g' "$file"
          done

      - name: Build Spartan
        run: |
          xcodebuild \
            -project Spartan.xcodeproj \
            -scheme Spartan \
            -configuration Release \
            -sdk appletvos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Find Built App
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Spartan.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          mkdir -p package/Applications

          cp -R "$APP_PATH" package/Applications/

      - name: Create Control File
        run: |
          mkdir -p package/DEBIAN

          cat > package/DEBIAN/control <<EOF
          Package: com.spartan.filemanager
          Name: Spartan
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Spartan File Manager for tvOS
          Maintainer: Spartan
          Author: Spartan
          Section: Applications
          Depends: firmware
          EOF

      - name: Install dpkg
        run: |
          brew install dpkg

      - name: Build DEB
        run: |
          dpkg-deb --build package Spartan.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Spartan-DEB
          path: Spartan.deb
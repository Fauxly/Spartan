name: Build Spartan DEB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build tvOS app
        run: |
          xcodebuild \
            -scheme Spartan \
            -configuration Release \
            -sdk appletvos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            BUILD_DIR=build

      - name: Locate app
        run: |
          APP_PATH=$(find build -name "*.app" | head -n 1)

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

          echo "Found app:"
          echo "$APP_PATH"

      - name: Prepare DEB structure
        run: |
          mkdir -p package/Applications
          cp -r "$APP_PATH" package/Applications/

          mkdir -p package/DEBIAN

          echo "Package: com.fauxly.spartan" > package/DEBIAN/control
          echo "Name: Spartan" >> package/DEBIAN/control
          echo "Version: 1.0" >> package/DEBIAN/control
          echo "Architecture: iphoneos-arm" >> package/DEBIAN/control
          echo "Description: Spartan File Manager for Apple TV" >> package/DEBIAN/control
          echo "Maintainer: Fauxly" >> package/DEBIAN/control
          echo "Author: Fauxly" >> package/DEBIAN/control
          echo "Section: Applications" >> package/DEBIAN/control
          echo "Depends: firmware (>= 13.0)" >> package/DEBIAN/control

      - name: Build DEB package
        run: |
          dpkg-deb --build package Spartan.deb

      - name: Verify DEB
        run: |
          dpkg-deb --info Spartan.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spartan-DEB
          path: Spartan.deb
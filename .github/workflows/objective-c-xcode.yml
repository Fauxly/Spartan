name: Build Spartan DEB

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Packages
        run: |
          xcodebuild -resolvePackageDependencies

      - name: Build Spartan
        run: |
          xcodebuild \
            -project Spartan.xcodeproj \
            -scheme Spartan \
            -configuration Release \
            -sdk appletvos \
            build

      - name: Find App
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Spartan.app" | head -n 1)

          mkdir -p package/Applications

          cp -R "$APP_PATH" package/Applications/

      - name: Create DEBIAN control
        run: |
          mkdir -p package/DEBIAN

          cat > package/DEBIAN/control <<EOF
          Package: com.spartan.filemanager
          Name: Spartan
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Spartan File Manager for tvOS
          Maintainer: Spartan
          Author: Spartan
          Section: Applications
          Depends: firmware
          EOF

      - name: Build DEB
        run: |
          brew install dpkg

          dpkg-deb --build package Spartan.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Spartan-DEB
          path: Spartan.deb
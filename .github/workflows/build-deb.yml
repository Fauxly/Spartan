name: Release Spartan tvOS Repo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Repo Tools
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev apt-utils

      - name: Create Repo Structure
        run: |
          mkdir -p repo

          ORIGINAL=$(find debs -name "*.deb" | head -n 1)

          cp "$ORIGINAL" repo/Fauxly-Spartan-tvOS.deb

      - name: Generate Packages
        run: |
          cd repo

          dpkg-scanpackages . /dev/null > Packages
          gzip -kf Packages

          apt-ftparchive release . > Release

      - name: Generate SHA256
        run: |
          cd repo

          shasum -a 256 Fauxly-Spartan-tvOS.deb > Fauxly-Spartan-tvOS.deb.sha256

      - name: Create TAR Archive
        run: |
          tar -czf Fauxly-Spartan-tvOS-Repo.tar.gz repo

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spartan-tvOS-Repo
          path: |
            repo/
            Fauxly-Spartan-tvOS-Repo.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tvos-release-${{ github.run_number }}
          name: Spartan tvOS Release ${{ github.run_number }}
          files: |
            repo/Fauxly-Spartan-tvOS.deb
            repo/Fauxly-Spartan-tvOS.deb.sha256
            repo/Packages
            repo/Packages.gz
            repo/Release
            Fauxly-Spartan-tvOS-Repo.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
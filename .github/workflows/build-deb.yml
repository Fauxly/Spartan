name: Release tvOS Repo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Repo Tools
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev apt-utils

      - name: Create Repo Structure
        run: |
          mkdir -p repo

          for file in debs/*.deb; do

            BASENAME=$(basename "$file")
            LOWER=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]')

            if [[ "$LOWER" == *"spartan"* ]]; then
              NEWNAME="com.fauxly.spartan_1.0_appletvos-arm64.deb"
            else
              NAME=$(basename "$file" .deb)
              CLEANNAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
              NEWNAME="com.fauxly.${CLEANNAME}.deb"
            fi

            cp "$file" "repo/$NEWNAME"

            echo "Copied $file -> repo/$NEWNAME"

          done

      - name: Generate Packages
        run: |
          cd repo

          dpkg-scanpackages . /dev/null > Packages
          gzip -kf Packages

          apt-ftparchive release . > Release

      - name: Generate SHA256 Hashes
        run: |
          cd repo

          for file in *.deb; do
            shasum -a 256 "$file" > "$file.sha256"
          done

      - name: Create TAR Archive
        run: |
          tar -czf Fauxly-tvOS-Repo.tar.gz repo

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Fauxly-tvOS-Repo
          path: |
            repo/
            Fauxly-tvOS-Repo.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tvos-release-${{ github.run_number }}
          name: Fauxly tvOS Release ${{ github.run_number }}
          files: |
            repo/*
            Fauxly-tvOS-Repo.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
